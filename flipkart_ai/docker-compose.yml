version: '3.9'
services:
  mongodb:
    image: mongo:7
    container_name: flipkart-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  postgres:
    image: pgvector/pgvector:pg16
    container_name: flipkart-postgres
    environment:
      POSTGRES_DB: flipkart_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mongo_data:
  postgres_data:
